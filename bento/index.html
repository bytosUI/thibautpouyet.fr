<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hub — Thibaut Pouyet</title>
  <meta name="description" content="Mon hub digital — live Twitch, dernières vidéos YouTube, films, Hacker News et plus." />
  <meta name="theme-color" content="#F9FAFB" />
  <meta name="robots" content="noindex" />

  <link rel="icon" type="image/svg+xml" href="../img/favicon.svg" />
  <link rel="apple-touch-icon" href="../img/apple-touch-icon.png" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wdth,wght@75..125,100..900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --color-primary:        #092DE6;
      --color-primary-light:  #4D6BFF;
      --color-primary-dark:   #051AA0;

      --color-secondary:      #0F0F11;
      --color-tertiary:       #FF5B60;

      --color-twitch:         #9146FF;
      --color-youtube:        #FF0000;
      --color-hackernews:     #FF6600;
      --color-live:           #FF3B30;

      --color-neutral-50:  #F9FAFB;
      --color-neutral-100: #F3F4F6;
      --color-neutral-200: #E5E7EB;
      --color-neutral-300: #D1D5DB;
      --color-neutral-400: #9CA3AF;
      --color-neutral-500: #6B7280;
      --color-neutral-600: #4B5563;
      --color-neutral-700: #374151;
      --color-neutral-900: #111827;

      --font-sans: 'Google Sans Flex', system-ui, sans-serif;

      --radius-md: 10px;
      --radius-lg: 14px;
      --radius-xl: 20px;
      --radius-2xl: 28px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; font-family: var(--font-sans); }
    body {
      min-height: 100%;
      background:
        radial-gradient(ellipse 55% 45% at 12% 10%, color-mix(in srgb, var(--color-primary) 9%, transparent), transparent 60%),
        radial-gradient(ellipse 50% 45% at 90% 95%, color-mix(in srgb, var(--color-tertiary) 10%, transparent), transparent 60%),
        var(--color-neutral-50);
      color: var(--color-neutral-900);
    }

    /* ── Header ─────────────────────────────────────── */
    .hub-header {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 24px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .back-link {
      display: inline-flex; align-items: center; gap: .5rem;
      font-size: .8125rem; font-weight: 500;
      color: var(--color-neutral-600);
      text-decoration: none;
      padding: .4rem .75rem;
      border-radius: 9999px;
      border: 1px solid var(--color-neutral-200);
      background: #fff;
      transition: color .2s, border-color .2s, transform .2s;
    }
    .back-link:hover {
      color: var(--color-primary);
      border-color: color-mix(in srgb, var(--color-primary) 28%, var(--color-neutral-200));
      transform: translateX(-2px);
    }
    .hub-title {
      font-size: 1.0625rem;
      font-weight: 600;
      letter-spacing: -.01em;
    }
    .hub-title span { color: var(--color-neutral-400); font-weight: 400; }

    /* ── Bento grid ─────────────────────────────────── */
    .bento {
      max-width: 1120px;
      margin: 0 auto;
      padding: 8px 24px 40px;
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: minmax(0, auto);
    }

    .cell {
      position: relative;
      border-radius: var(--radius-2xl);
      background: #fff;
      border: 1px solid var(--color-neutral-200);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
    }
    .cell-hover { cursor: pointer; text-decoration: none; color: inherit; }
    .cell-hover:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 40px -12px rgba(9,45,230,.18);
      border-color: color-mix(in srgb, var(--color-primary) 28%, var(--color-neutral-200));
    }

    /* Size variants */
    .cell-2x2 { grid-column: span 2; grid-row: span 2; }
    .cell-2x1 { grid-column: span 2; grid-row: span 1; }
    .cell-4x1 { grid-column: span 4; grid-row: span 1; }
    .cell-1x1 { grid-column: span 1; grid-row: span 1; }

    /* Cell header (title + icon) */
    .cell-head {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-bottom: .875rem;
    }
    .cell-head .dot {
      width: 28px; height: 28px;
      border-radius: 8px;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .cell-head .label {
      font-size: .7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--color-neutral-500);
    }

    /* Twitch cell */
    .cell-twitch .dot { background: color-mix(in srgb, var(--color-twitch) 12%, #fff); color: var(--color-twitch); }
    .live-stream {
      display: flex; gap: .875rem;
      padding: .75rem;
      border-radius: var(--radius-lg);
      background: var(--color-neutral-50);
      border: 1px solid var(--color-neutral-100);
      transition: background .2s;
    }
    .live-stream:hover { background: color-mix(in srgb, var(--color-twitch) 6%, var(--color-neutral-50)); }
    .live-stream + .live-stream { margin-top: .5rem; }
    .live-avatar {
      width: 44px; height: 44px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .live-avatar-fallback {
      width: 44px; height: 44px;
      border-radius: 10px;
      background: var(--color-neutral-200);
      color: var(--color-neutral-600);
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 600;
      flex-shrink: 0;
    }
    .live-info { min-width: 0; flex: 1; }
    .live-user { font-size: .875rem; font-weight: 600; color: var(--color-neutral-900); }
    .live-game { font-size: .75rem; color: var(--color-neutral-500); margin-top: 2px; }
    .live-meta { display: flex; align-items: center; gap: .5rem; margin-top: 4px; }
    .badge-live {
      display: inline-flex; align-items: center; gap: .3rem;
      font-size: .65rem; font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: 2px 7px;
      border-radius: 4px;
      background: var(--color-live);
      color: #fff;
    }
    .badge-live::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 9999px;
      background: #fff;
      animation: pulse-live 1.6s ease-in-out infinite;
    }
    @keyframes pulse-live {
      0%, 100% { opacity: 1; }
      50% { opacity: .4; }
    }
    .live-viewers { font-size: .7rem; color: var(--color-neutral-500); font-variant-numeric: tabular-nums; }
    .empty-state {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center;
      color: var(--color-neutral-400);
      font-size: .8125rem;
      gap: .5rem;
      padding: 1rem;
    }

    /* YouTube cell */
    .cell-youtube .dot { background: color-mix(in srgb, var(--color-youtube) 12%, #fff); color: var(--color-youtube); }
    .yt-list {
      display: flex;
      flex-direction: column;
      gap: .4rem;
    }
    .yt-row {
      display: flex;
      gap: .5rem;
      align-items: center;
      padding: .3rem .45rem;
      border-radius: var(--radius-md);
      background: var(--color-neutral-50);
      border: 1px solid var(--color-neutral-100);
      text-decoration: none;
      color: inherit;
      transition: background .2s, border-color .2s;
      min-width: 0;
    }
    .yt-row:hover {
      background: #fff;
      border-color: color-mix(in srgb, var(--color-youtube) 28%, var(--color-neutral-200));
    }
    .yt-row-thumb {
      width: 70px;
      aspect-ratio: 16/9;
      border-radius: 4px;
      object-fit: cover;
      background: var(--color-neutral-200);
      flex-shrink: 0;
    }
    .yt-row-body { min-width: 0; flex: 1; }
    .yt-row-title {
      font-size: .75rem;
      font-weight: 500;
      line-height: 1.25;
      color: var(--color-neutral-900);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .yt-row-meta {
      font-size: .65rem;
      color: var(--color-neutral-500);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Weather cell */
    .cell-weather .dot { background: color-mix(in srgb, var(--color-primary) 12%, #fff); color: var(--color-primary); }
    .weather-row {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .weather-now {
      display: flex;
      align-items: center;
      gap: .875rem;
      flex: 1;
      min-width: 0;
    }
    .weather-now-icon {
      color: var(--color-primary);
      display: inline-flex;
      flex-shrink: 0;
    }
    .weather-now-main { min-width: 0; }
    .weather-now-city {
      font-size: .65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--color-neutral-500);
    }
    .weather-now-temp {
      font-size: 2rem;
      font-weight: 600;
      line-height: 1.1;
      color: var(--color-neutral-900);
      font-variant-numeric: tabular-nums;
      margin-top: 2px;
    }
    .weather-now-desc {
      font-size: .75rem;
      color: var(--color-neutral-600);
      margin-top: 2px;
    }
    .weather-meta {
      display: flex;
      gap: 1rem;
      font-size: .75rem;
      color: var(--color-neutral-500);
      font-variant-numeric: tabular-nums;
    }
    .weather-meta span { display: inline-flex; align-items: center; gap: .3rem; }
    .weather-forecast {
      display: flex;
      gap: .5rem;
    }
    .weather-day {
      text-align: center;
      min-width: 60px;
      padding: .5rem .4rem;
      border-radius: var(--radius-md);
      background: var(--color-neutral-50);
      border: 1px solid var(--color-neutral-100);
    }
    .weather-day-label {
      font-size: .6rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--color-neutral-500);
      letter-spacing: .05em;
    }
    .weather-day-icon {
      color: var(--color-primary);
      margin: 4px 0;
      display: flex;
      justify-content: center;
    }
    .weather-day-temp {
      font-size: .7rem;
      color: var(--color-neutral-600);
      font-variant-numeric: tabular-nums;
    }
    .weather-day-temp .max { font-weight: 600; color: var(--color-neutral-900); }
    .weather-day-temp .sep { color: var(--color-neutral-300); margin: 0 2px; }

    /* Films cell */
    .cell-films .dot { background: color-mix(in srgb, var(--color-tertiary) 14%, #fff); color: var(--color-tertiary); }
    .poster-strip {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: .625rem;
    }
    .poster {
      display: block;
      aspect-ratio: 2/3;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--color-neutral-100);
      position: relative;
      text-decoration: none;
      color: inherit;
      transition: transform .2s;
    }
    .poster:hover { transform: translateY(-3px); }
    .poster img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .poster-rank {
      position: absolute;
      top: 6px; left: 6px;
      width: 22px; height: 22px;
      border-radius: 6px;
      background: rgba(0,0,0,.7);
      color: #fff;
      font-size: .7rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(6px);
    }

    /* GitHub cell */
    .cell-github .dot { background: var(--color-neutral-900); color: #fff; }
    .gh-list { display: flex; flex-direction: column; gap: .5rem; }
    .gh-item {
      display: flex; gap: .625rem; align-items: flex-start;
      padding: .5rem .625rem;
      border-radius: var(--radius-md);
      background: var(--color-neutral-50);
      border: 1px solid var(--color-neutral-100);
      text-decoration: none;
      color: inherit;
      transition: background .2s;
    }
    .gh-item:hover { background: var(--color-neutral-100); }
    .gh-icon { color: var(--color-neutral-500); margin-top: 1px; flex-shrink: 0; }
    .gh-text { font-size: .8125rem; min-width: 0; flex: 1; }
    .gh-repo { font-weight: 600; color: var(--color-neutral-900); }
    .gh-msg { color: var(--color-neutral-500); font-size: .75rem; margin-top: 1px; }
    .gh-time { font-size: .7rem; color: var(--color-neutral-400); font-variant-numeric: tabular-nums; flex-shrink: 0; }

    /* Hacker News cell */
    .cell-hn .dot { background: color-mix(in srgb, var(--color-hackernews) 14%, #fff); color: var(--color-hackernews); }
    .hn-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: .625rem; }
    .hn-item {
      padding: .75rem .875rem;
      border-radius: var(--radius-lg);
      background: var(--color-neutral-50);
      border: 1px solid var(--color-neutral-100);
      text-decoration: none;
      color: inherit;
      transition: background .2s, border-color .2s;
      display: flex; flex-direction: column; gap: 4px;
    }
    .hn-item:hover {
      background: #fff;
      border-color: color-mix(in srgb, var(--color-hackernews) 24%, var(--color-neutral-200));
    }
    .hn-source { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--color-hackernews); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hn-title { font-size: .8125rem; font-weight: 500; line-height: 1.35; color: var(--color-neutral-900); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .hn-meta { font-size: .7rem; color: var(--color-neutral-500); display: flex; gap: .5rem; align-items: center; margin-top: auto; font-variant-numeric: tabular-nums; }
    .hn-meta .dot-sep { color: var(--color-neutral-300); }

    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--color-neutral-100) 0%, var(--color-neutral-200) 50%, var(--color-neutral-100) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.4s linear infinite;
      border-radius: var(--radius-md);
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Footer */
    .hub-footer {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 24px 32px;
      font-size: .75rem;
      color: var(--color-neutral-400);
      text-align: center;
    }
    .hub-footer a { color: var(--color-neutral-500); text-decoration: none; }
    .hub-footer a:hover { color: var(--color-primary); }

    /* ── Responsive ─────────────────────────────────── */
    @media (max-width: 900px) {
      .bento { grid-template-columns: repeat(2, 1fr); }
      .cell-2x2, .cell-2x1, .cell-4x1 { grid-column: span 2; grid-row: auto; }
      .hn-list { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .bento { grid-template-columns: 1fr; padding: 8px 16px 32px; }
      .cell-2x2, .cell-2x1, .cell-4x1, .cell-1x1 { grid-column: span 1; }
      .hub-header { padding: 16px 16px 8px; }
      .poster-strip { grid-template-columns: repeat(3, 1fr); }
      .poster:nth-child(4), .poster:nth-child(5) { display: none; }
    }
  </style>
</head>
<body>

  <header class="hub-header">
    <a href="../" class="back-link">
      <iconify-icon icon="heroicons:arrow-left" width="14"></iconify-icon>
      Retour
    </a>
    <p class="hub-title">Hub <span>— mes centres d'intérêt digitaux</span></p>
    <span style="width: 80px"></span>
  </header>

  <main class="bento">

    <!-- Weather (4x1) -->
    <section class="cell cell-4x1 cell-weather" data-slot="weather">
      <div class="cell-head">
        <span class="dot"><iconify-icon icon="mdi:weather-partly-cloudy" width="16"></iconify-icon></span>
        <span class="label">Météo</span>
      </div>
      <div data-content>
        <div class="skeleton" style="height: 80px;"></div>
      </div>
    </section>

    <!-- YouTube — Dernières vidéos par chaîne (2x2) -->
    <section class="cell cell-2x2 cell-youtube" data-slot="youtube">
      <div class="cell-head">
        <span class="dot"><iconify-icon icon="mdi:youtube" width="18"></iconify-icon></span>
        <span class="label">Dernières vidéos</span>
      </div>
      <div data-content class="flex-1">
        <div class="yt-list">
          <div class="skeleton" style="height: 50px;"></div>
          <div class="skeleton" style="height: 50px;"></div>
          <div class="skeleton" style="height: 50px;"></div>
          <div class="skeleton" style="height: 50px;"></div>
        </div>
      </div>
    </section>

    <!-- Twitch Live (2x2) -->
    <section class="cell cell-2x2 cell-twitch" data-slot="twitch">
      <div class="cell-head">
        <span class="dot"><iconify-icon icon="mdi:twitch" width="16"></iconify-icon></span>
        <span class="label">En live</span>
      </div>
      <div data-content class="flex-1">
        <div class="skeleton" style="height: 60px; margin-bottom: 8px;"></div>
        <div class="skeleton" style="height: 60px;"></div>
      </div>
    </section>

    <!-- Films Top 5 (4x1) -->
    <section class="cell cell-4x1 cell-films" data-slot="films">
      <div class="cell-head">
        <span class="dot"><iconify-icon icon="heroicons:film-solid" width="16"></iconify-icon></span>
        <span class="label">À l'affiche</span>
      </div>
      <div data-content>
        <div class="poster-strip">
          <div class="skeleton" style="aspect-ratio: 2/3;"></div>
          <div class="skeleton" style="aspect-ratio: 2/3;"></div>
          <div class="skeleton" style="aspect-ratio: 2/3;"></div>
          <div class="skeleton" style="aspect-ratio: 2/3;"></div>
          <div class="skeleton" style="aspect-ratio: 2/3;"></div>
        </div>
      </div>
    </section>

    <!-- GitHub (2x2) -->
    <section class="cell cell-2x2 cell-github" data-slot="github">
      <div class="cell-head">
        <span class="dot"><iconify-icon icon="mdi:github" width="16"></iconify-icon></span>
        <span class="label">Activité GitHub</span>
      </div>
      <div data-content class="flex-1">
        <div class="skeleton" style="height: 40px; margin-bottom: 6px;"></div>
        <div class="skeleton" style="height: 40px; margin-bottom: 6px;"></div>
        <div class="skeleton" style="height: 40px;"></div>
      </div>
    </section>

    <!-- Hacker News (2x2) -->
    <section class="cell cell-2x2 cell-hn" data-slot="hackernews">
      <div class="cell-head">
        <span class="dot"><iconify-icon icon="simple-icons:ycombinator" width="16"></iconify-icon></span>
        <span class="label">Hacker News</span>
      </div>
      <div data-content class="flex-1">
        <div class="hn-list">
          <div class="skeleton" style="height: 70px;"></div>
          <div class="skeleton" style="height: 70px;"></div>
          <div class="skeleton" style="height: 70px;"></div>
          <div class="skeleton" style="height: 70px;"></div>
        </div>
      </div>
    </section>

  </main>

  <footer class="hub-footer">
    Mis à jour <span data-updated>—</span> · <a href="../">thibautpouyet.fr</a>
  </footer>

  <script src="app.js"></script>
</body>
</html>
